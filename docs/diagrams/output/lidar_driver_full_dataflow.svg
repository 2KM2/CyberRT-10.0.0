8.5058,312,1028.5058,308,1032.5058" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.5;" x1="308" x2="308" y1="1074.8499" y2="1094.8499"/><polygon fill="#383838" points="304,1084.8499,308,1094.8499,312,1084.8499,308,1088.8499" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.5;" x1="308" x2="308" y1="1131.1941" y2="1151.1941"/><polygon fill="#383838" points="304,1141.1941,308,1151.1941,312,1141.1941,308,1145.1941" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.5;" x1="308" x2="308" y1="1203.8823" y2="1223.8823"/><polygon fill="#383838" points="304,1213.8823,308,1223.8823,312,1213.8823,308,1217.8823" style="stroke: #383838; stroke-width: 1.0;"/><line style="stroke: #383838; stroke-width: 1.5;" x1="308" x2="308" y1="1260.2264" y2="1280.2264"/><polygon fill="#383838" points="304,1270.2264,308,1280.2264,312,1270.2264,308,1274.2264" style="stroke: #383838; stroke-width: 1.0;"/><!--MD5=[dd7a3cf499ecaf767fec3d76178dc9fb]
@startuml
skinparam shadowing false
skinparam monochrome true
skinparam defaultTextAlignment center

start
:Velodyne 激光雷达硬件持续发 UDP 报文;
fork
  :positioning UDP 包进入 positioning_data_port;
  :SocketInput::get_positioning_data_packet();
  :exract_nmea_time_from_packet();
  :SetBaseTimeFromNmeaTime();
  :建立 basetime_;
fork again
  :firing UDP 包进入 firing_data_port;
  :SocketInput::get_firing_data_packet();
  :生成单个 VelodynePacket;
  :VelodyneDriver::PollStandard() 连续收包;
  :多个 VelodynePacket 组装成 VelodyneScan;
  :scan 写入 basetime / frame_id / model / mode;
end fork
:driver 的 writer_->Write(scan);
:发布到 scan_channel\n如 /apollo/sensor/lidar16/front/center/Scan;
:VelodyneConvertComponent 的 Reader<VelodyneScan> 收到消息;
:component 框架回调触发;
:Process(scan_msg);
:VelodyneConvertComponent::Proc(scan_msg);
:ConvertPacketsToPointcloud(scan_msg, point_cloud);
:VelodyneParser::GeneratePointcloud(...);
:得到 PointCloud;
:component 内部 writer_->Write(point_cloud);
:发布到 convert_channel_name\n如 /apollo/sensor/lidar16/front/center/PointCloud2;
:CompensatorComponent / 后续感知模块继续消费;
stop
@enduml

